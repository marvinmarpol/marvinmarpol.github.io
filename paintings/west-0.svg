<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0e60d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d0e60d" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="#090909"/>

  <!-- Faint horizontal grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.025">
    <line x1="0" y1="133" x2="600" y2="133"/>
    <line x1="0" y1="266" x2="600" y2="266"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="533" x2="600" y2="533"/>
    <line x1="0" y1="666" x2="600" y2="666"/>
  </g>

  <!-- Center divider -->
  <line x1="300" y1="0" x2="300" y2="800" stroke="#d0e60d" stroke-width="0.6" opacity="0.1"/>

  <!-- Traffic source + split arrows -->
  <circle cx="300" cy="85" r="5.5" fill="#d0e60d" opacity="0.65"/>
  <circle cx="300" cy="60" r="2.5" fill="#d0e60d" opacity="0.4"/>
  <circle cx="286" cy="72" r="2" fill="#d0e60d" opacity="0.28"/>
  <circle cx="314" cy="72" r="2" fill="#d0e60d" opacity="0.28"/>

  <line x1="300" y1="91" x2="158" y2="185" stroke="#d0e60d" stroke-width="1.2" opacity="0.45"/>
  <line x1="300" y1="91" x2="442" y2="185" stroke="#ffffff" stroke-width="1.2" opacity="0.1"/>

  <!-- A label -->
  <text x="158" y="250" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="90" font-weight="bold"
        fill="#d0e60d" opacity="0.9">A</text>

  <!-- B label -->
  <text x="442" y="250" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="90" font-weight="bold"
        fill="#ffffff" opacity="0.1">B</text>

  <!-- A bars (rising, 4 bars) -->
  <rect x="50"  y="590" width="46" height="110" fill="url(#gA)"/>
  <rect x="110" y="515" width="46" height="185" fill="url(#gA)"/>
  <rect x="170" y="430" width="46" height="270" fill="url(#gA)"/>
  <rect x="230" y="335" width="46" height="365" fill="url(#gA)"/>

  <!-- B bars (flat, 4 bars) -->
  <rect x="324" y="640" width="46" height="60"  fill="url(#gB)"/>
  <rect x="384" y="626" width="46" height="74"  fill="url(#gB)"/>
  <rect x="444" y="614" width="46" height="86"  fill="url(#gB)"/>
  <rect x="504" y="604" width="46" height="96"  fill="url(#gB)"/>

  <!-- Baselines -->
  <line x1="40"  y1="700" x2="286" y2="700" stroke="#d0e60d" stroke-width="0.8" opacity="0.28"/>
  <line x1="314" y1="700" x2="560" y2="700" stroke="#ffffff" stroke-width="0.8" opacity="0.07"/>

  <!-- A metric -->
  <text x="158" y="735" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="22" fill="#d0e60d" opacity="0.82">+70%</text>
  <text x="158" y="752" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#d0e60d" opacity="0.3"
        letter-spacing="2.5">RELEASE ACCURACY</text>

  <!-- B metric -->
  <text x="442" y="735" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#ffffff" opacity="0.1">control</text>

  <!-- Corner tag -->
  <text x="28" y="786"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#d0e60d" opacity="0.18"
        letter-spacing="3">A/B TEST · 2024</text>
</svg>

  <circle cx="310" cy="510" r="9" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.7"/>
  <circle cx="410" cy="510" r="9" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.7"/>
  <circle cx="490" cy="510" r="9" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.7"/>
  <circle cx="110" cy="510" r="2.5" fill="#d0e60d" opacity="0.5"/>
  <circle cx="210" cy="510" r="2.5" fill="#d0e60d" opacity="0.5"/>
  <circle cx="310" cy="510" r="2.5" fill="#d0e60d" opacity="0.5"/>
  <circle cx="410" cy="510" r="2.5" fill="#d0e60d" opacity="0.5"/>
  <circle cx="490" cy="510" r="2.5" fill="#d0e60d" opacity="0.5"/>


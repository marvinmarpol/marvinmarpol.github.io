    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="480" x2="600" y2="480"/>
    <line x1="0" y1="640" x2="600" y2="640"/>
    <line x1="150" y1="0" x2="150" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="450" y1="0" x2="450" y2="800"/>
  </g>

  <!-- ── MONOLITH (top half, centered-left) ── -->
  <text x="300" y="80" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#ffffff" opacity="0.18"
        letter-spacing="4">BEFORE</text>

  <!-- Monolith block — one large rectangle, slightly fragile looking -->
  <rect x="175" y="100" width="250" height="195" fill="#1a1a1a" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.18"/>
  <!-- Internal divisions suggesting a tangled, tightly-coupled system -->
  <line x1="175" y1="148" x2="425" y2="148" stroke="#ffffff" stroke-width="0.5" opacity="0.09"/>
  <line x1="175" y1="196" x2="425" y2="196" stroke="#ffffff" stroke-width="0.5" opacity="0.09"/>
  <line x1="175" y1="244" x2="425" y2="244" stroke="#ffffff" stroke-width="0.5" opacity="0.09"/>
  <line x1="258" y1="100" x2="258" y2="295" stroke="#ffffff" stroke-width="0.5" opacity="0.09"/>
  <line x1="342" y1="100" x2="342" y2="295" stroke="#ffffff" stroke-width="0.5" opacity="0.09"/>
  <!-- Monolith label -->
  <text x="300" y="202" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#ffffff" opacity="0.22"
        letter-spacing="1">MONOLITH</text>

  <!-- Transition arrow -->
  <rect x="44" y="335" width="512" height="2" fill="url(#arrowGrad)"/>
  <polygon points="556,328 572,336 556,344" fill="#d0e60d" opacity="0.7"/>
  <text x="300" y="328" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#d0e60d" opacity="0.4"
        letter-spacing="3">MIGRATION</text>

  <!-- ── MICROSERVICES (bottom half) ── -->
  <text x="300" y="384" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#d0e60d" opacity="0.35"
        letter-spacing="4">AFTER</text>

  <!-- Service nodes — 12 circles connected by lines -->
  <!-- Define node positions -->
  <!-- Row 1: 3 nodes -->
  <!-- Row 2: 4 nodes -->
  <!-- Row 3: 3 nodes -->
  <!-- Row 4: 2 nodes -->

  <!-- Connection lines first (drawn under nodes) -->
  <!-- Row1 → Row2 connections -->
  <line x1="130" y1="440" x2="110" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="130" y1="440" x2="210" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="300" y1="440" x2="210" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="300" y1="440" x2="310" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="300" y1="440" x2="410" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="470" y1="440" x2="410" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="470" y1="440" x2="490" y2="510" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <!-- Row2 → Row3 connections -->
  <line x1="110" y1="510" x2="170" y2="580" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="210" y1="510" x2="170" y2="580" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="310" y1="510" x2="300" y2="580" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="410" y1="510" x2="300" y2="580" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="410" y1="510" x2="430" y2="580" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="490" y1="510" x2="430" y2="580" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <!-- Row3 → Row4 connections -->
  <line x1="170" y1="580" x2="220" y2="645" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="300" y1="580" x2="220" y2="645" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="300" y1="580" x2="380" y2="645" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>
  <line x1="430" y1="580" x2="380" y2="645" stroke="#d0e60d" stroke-width="0.7" opacity="0.22"/>

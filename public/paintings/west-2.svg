  <circle cx="170" cy="580" r="9" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.7"/>
  <circle cx="300" cy="580" r="9" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.7"/>
  <circle cx="430" cy="580" r="9" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.7"/>
  <circle cx="170" cy="580" r="2.5" fill="#d0e60d" opacity="0.5"/>
  <circle cx="300" cy="580" r="2.5" fill="#d0e60d" opacity="0.5"/>
  <circle cx="430" cy="580" r="2.5" fill="#d0e60d" opacity="0.5"/>

  <!-- Row 4 nodes (output/leaf) -->
  <circle cx="220" cy="645" r="8" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.6"/>
  <circle cx="380" cy="645" r="8" fill="#111" stroke="#d0e60d" stroke-width="1" opacity="0.6"/>
  <circle cx="220" cy="645" r="2" fill="#d0e60d" opacity="0.45"/>
  <circle cx="380" cy="645" r="2" fill="#d0e60d" opacity="0.45"/>

  <!-- Metrics row -->
  <line x1="44" y1="688" x2="556" y2="688" stroke="#d0e60d" stroke-width="0.5" opacity="0.14"/>

  <text x="130" y="716" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="17" fill="#d0e60d" opacity="0.78">−50%</text>
  <text x="130" y="732" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" fill="#d0e60d" opacity="0.3"
        letter-spacing="1.5">DEPLOY TIME</text>

  <text x="300" y="716" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="17" fill="#d0e60d" opacity="0.78">−60%</text>
  <text x="300" y="732" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" fill="#d0e60d" opacity="0.3"
        letter-spacing="1.5">DOWNTIME</text>

  <text x="470" y="716" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="17" fill="#d0e60d" opacity="0.78">−70%</text>
  <text x="470" y="732" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" fill="#d0e60d" opacity="0.3"
        letter-spacing="1.5">STORAGE (CQRS)</text>

  <!-- Corner tag -->
  <text x="28" y="786"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#d0e60d" opacity="0.18"

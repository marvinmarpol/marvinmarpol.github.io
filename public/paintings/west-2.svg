  <line x1="110" y1="510" x2="310" y2="510" stroke="#d0e60d" stroke-width="0.5" opacity="0.12" stroke-dasharray="4,4"/>
  <line x1="310" y1="510" x2="490" y2="510" stroke="#d0e60d" stroke-width="0.5" opacity="0.12" stroke-dasharray="4,4"/>


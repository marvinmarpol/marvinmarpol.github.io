<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%"  stop-color="#d0e60d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d0e60d" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="leftFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="rightFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d0e60d" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d0e60d" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="#090909"/>

  <!-- Faint vertical split guide -->
  <line x1="300" y1="0" x2="300" y2="800" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- Column headers -->
  <text x="150" y="58" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#ffffff" opacity="0.25"
        letter-spacing="3">BACKEND</text>
  <text x="450" y="58" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#d0e60d" opacity="0.5"
        letter-spacing="3">FRONTEND</text>

  <!-- Header underlines -->
  <line x1="60"  y1="64" x2="240" y2="64" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="360" y1="64" x2="540" y2="64" stroke="#d0e60d" stroke-width="0.5" opacity="0.28"/>

  <!-- Bridge line across the middle -->
  <rect x="44" y="398" width="512" height="1.5" fill="url(#bridgeGrad)"/>
  <text x="300" y="390" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#d0e60d" opacity="0.35"
        letter-spacing="4">FULLSTACK</text>

  <!-- ── BACKEND stack items (left column) ── -->
  <!-- Each item: a pill/tag with the tech name -->

  <!-- Go -->
  <rect x="58" y="90" width="180" height="42" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.2"/>
  <text x="78" y="118" font-family="'Courier New', Courier, monospace"
        font-size="20" fill="#ffffff" opacity="0.55" font-weight="bold">Go</text>
  <text x="230" y="118" text-anchor="end" font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#ffffff" opacity="0.2">primary</text>

  <!-- Node.js -->
  <rect x="58" y="148" width="180" height="42" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.18"/>
  <text x="78" y="176" font-family="'Courier New', Courier, monospace"
        font-size="16" fill="#ffffff" opacity="0.45">Node.js</text>

  <!-- NestJS -->
  <rect x="58" y="206" width="180" height="36" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.14"/>
  <text x="78" y="230" font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#ffffff" opacity="0.35">NestJS</text>

  <!-- Python -->
  <rect x="58" y="258" width="180" height="34" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.12"/>
  <text x="78" y="281" font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#ffffff" opacity="0.28">Python</text>

  <!-- PHP -->
  <rect x="58" y="308" width="180" height="30" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="78" y="329" font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#ffffff" opacity="0.22">PHP · Java</text>

  <!-- Divider -->
  <line x1="68" y1="352" x2="228" y2="352" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>

  <!-- PostgreSQL -->
  <rect x="58" y="420" width="180" height="36" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.14"/>
  <text x="78" y="444" font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#ffffff" opacity="0.32">PostgreSQL</text>

  <!-- Redis -->
  <rect x="58" y="472" width="180" height="34" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.12"/>
  <text x="78" y="495" font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#ffffff" opacity="0.26">Redis</text>

  <!-- MongoDB -->
  <rect x="58" y="522" width="180" height="32" rx="3"
        fill="#111" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="78" y="544" font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#ffffff" opacity="0.2">MongoDB · ES</text>

  <!-- ── FRONTEND stack items (right column) ── -->

  <!-- React -->
  <rect x="362" y="90" width="180" height="42" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.9" stroke-opacity="0.5"/>
  <text x="382" y="118" font-family="'Courier New', Courier, monospace"
        font-size="20" fill="#d0e60d" opacity="0.88" font-weight="bold">React</text>
  <text x="530" y="118" text-anchor="end" font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#d0e60d" opacity="0.35">primary</text>

  <!-- TypeScript -->
  <rect x="362" y="148" width="180" height="42" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="382" y="176" font-family="'Courier New', Courier, monospace"
        font-size="16" fill="#d0e60d" opacity="0.75">TypeScript</text>

  <!-- Vue -->
  <rect x="362" y="206" width="180" height="36" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.7" stroke-opacity="0.32"/>
  <text x="382" y="230" font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#d0e60d" opacity="0.62">Vue</text>

  <!-- Next.js -->
  <rect x="362" y="258" width="180" height="34" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.6" stroke-opacity="0.26"/>
  <text x="382" y="281" font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#d0e60d" opacity="0.5">Next.js</text>

  <!-- Angular -->
  <rect x="362" y="308" width="180" height="30" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="382" y="329" font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#d0e60d" opacity="0.38">Angular · Nuxt</text>

  <!-- Divider -->
  <line x1="372" y1="352" x2="532" y2="352" stroke="#d0e60d" stroke-width="0.4" opacity="0.14"/>

  <!-- Redux / Zustand -->
  <rect x="362" y="420" width="180" height="36" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.6" stroke-opacity="0.26"/>
  <text x="382" y="444" font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#d0e60d" opacity="0.5">Redux · Zustand</text>

  <!-- CSS / Tailwind -->
  <rect x="362" y="472" width="180" height="34" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="382" y="495" font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#d0e60d" opacity="0.38">CSS · Tailwind</text>

  <!-- R3F / Three.js -->
  <rect x="362" y="522" width="180" height="32" rx="3"
        fill="#111" stroke="#d0e60d" stroke-width="0.5" stroke-opacity="0.18"/>
  <text x="382" y="544" font-family="'Courier New', Courier, monospace"
        font-size="11.5" fill="#d0e60d" opacity="0.3">Three.js · R3F</text>

  <!-- Bottom rule + metric -->
  <line x1="44" y1="618" x2="556" y2="618" stroke="#d0e60d" stroke-width="0.5" opacity="0.12"/>

  <text x="150" y="648" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#ffffff" opacity="0.22"
        letter-spacing="2">12+ yrs backend</text>

  <text x="450" y="648" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#d0e60d" opacity="0.42"
        letter-spacing="2">pixel-precise UI</text>

  <!-- Language count badges -->
  <text x="300" y="690" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" fill="#d0e60d" opacity="0.55"
        letter-spacing="1">FULLSTACK ENGINEERING</text>

  <!-- Corner tag -->
  <text x="28" y="786"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#d0e60d" opacity="0.18"
        letter-spacing="3">FULLSTACK · GO · REACT</text>
</svg>
